name: Build XeLaTeX documents
on: [push]
env:
  OUT_DIR: output
  ARTIFACT_NAME: math-notes
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6.0.2

      - name: Enable unprivileged user namespaces
        if: github.server_url == 'https://github.com' && matrix.system != 'aarch64-darwin'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Install Lix
        if: github.server_url == 'https://github.com'
        uses: samueldr/lix-gha-installer-action@f5e94192f565f53d84f41a056956dc0d3183b343

      - name: Install Lix (Single User)
        if: github.server_url != 'https://github.com'
        uses: canidae-solutions/lix-quick-install-action@v4.0.1
        with:
          github_access_token: ${{ secrets.ACCESS_TOKEN_GITHUB }}
          lix_conf: |
            extra-substituters = https://nix-cache.s3-pub.proteus.eu.org/
            extra-trusted-public-keys = s3.proteus.eu.org-1:IxrRwk4uC5ittHeG9menkuajABnrX9cboEWwZz/m4+E=

      - name: Magic Nix Cache
        if: github.server_url == 'https://github.com'
        uses: DeterminateSystems/magic-nix-cache-action@v13

      # # Debug
      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3.23
      # You can also try https://upterm.dev/

      - name: Compile LaTeX document
        run: |
          # 1. Build fonts and construct the OSFONTDIR path dynamically.
          # We use 'sed' to append the critical '//' for recursive search.
          FONT_DIRS=$(nix build \
            nixpkgs#nerd-fonts.iosevka \
            nixpkgs#noto-fonts-cjk-sans \
            nixpkgs#noto-fonts-cjk-serif \
            --print-out-paths --no-link \
            | sed 's|$|/share/fonts//|' \
            | paste -sd ":" -)
          # 2. Run the build
          # The variable FONT_DIRS now contains the store paths with '//' appended
          nix develop github:magic0whi/dev_flake#latex --command \
            env OSFONTDIR="$FONT_DIRS" \
            nix run nixpkgs#just -- build

      - name: Upload artifact for Github
        if: github.server_url == 'https://github.com'
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.OUT_DIR }}/*.pdf

      - name: Upload artifact for Forgejo
        if: github.server_url != 'https://github.com'
        uses: ChristopherHX/gitea-upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.OUT_DIR }}/*.pdf
